global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'spring-boot-services'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'host.docker.internal:8080' # gateway
          - 'host.docker.internal:8081' # user-service
          - 'host.docker.internal:8082' # event-service
          - 'host.docker.internal:8083' # inventory-service
          - 'host.docker.internal:8084' # booking-service
          - 'host.docker.internal:8085' # payment-service
          - 'host.docker.internal:8086' # notification-service
